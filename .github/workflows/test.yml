name: test
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Prepare test artifact workspace
        run: mkdir -p .tmp
      - name: Test
        env:
          TMPDIR: ${{ github.workspace }}/.tmp
        run: |
          set -o pipefail
          go test -v -race -covermode=atomic -coverprofile=coverage.out ./... 2>&1 | tee test.log
      - name: Vulnerability check
        run: |
          set -o pipefail
          go tool govulncheck ./... 2>&1 | tee -a test.log
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-failure-artifacts
          path: |
            test.log
            .tmp/**/*.db
            .tmp/**/.config/balda/nats/**
          if-no-files-found: warn
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage.out
          path: coverage.out
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: true

  projection-replay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Projection replay tests
        run: go test -race -count=15 ./internal/apps/balda/execution -run 'TestEventProjectorReplayAfterRestartRemainsIdempotent'

  architecture-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Architecture lint
        run: go tool go-arch-lint check --project-path .

  jetstream-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Embedded JetStream integration tests
        run: go test -race ./internal/apps/balda/eventbus/nats

  ingress-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Webhook, scheduler, and goal E2E tests
        run: go test -race ./internal/apps/balda/handlers -run 'TestInboundWebhookReceiver_AcceptsAndPublishesCommand|TestInboundWebhookReceiver_SessionModePublishesSessionCommand|TestScheduledTaskSchedulerDispatchTask_PublishesCommandAndReschedules|TestCommandHandlerSubmitGoalTask_PublishesDurableCommandOnly'
