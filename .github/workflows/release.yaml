name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/release-gate

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ -z "${version}" ]]; then
            echo "GITHUB_REF_NAME is required"
            exit 1
          fi
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${GITHUB_SHA} -X main.date=${build_date}"

          binary="balda"
          main_pkg="./cmd/balda"
          mkdir -p dist

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"${target}"
            artifact="${binary}-${version}-${goos}-${goarch}"
            workdir="dist/${artifact}"
            mkdir -p "${workdir}"

            out_name="${binary}"
            if [[ "${goos}" == "windows" ]]; then
              out_name="${out_name}.exe"
            fi

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="${ldflags}" -o "${workdir}/${out_name}" "${main_pkg}"
            cp README.md LICENSE "${workdir}/"

            tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
            rm -rf "${workdir}"
          done

          (
            cd dist
            sha256sum ./*.tar.gz > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/release-gate
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Set release metadata
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ -z "${version}" ]]; then
            echo "GITHUB_REF_NAME is required"
            exit 1
          fi

          {
            echo "version=${version}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "image=ghcr.io/${GITHUB_REPOSITORY,,}"
          } >> "${GITHUB_ENV}"

      - name: Build smoke-test image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            -f Dockerfile.release \
            -t balda-release:test \
            --build-arg VERSION="${version}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${build_date}" \
            .

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm --entrypoint sh balda-release:test -lc '
            balda --help >/dev/null &&
            command -v codex &&
            command -v opencode &&
            command -v gemini &&
            command -v claude &&
            command -v copilot
          '

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.image }}:latest
          build-args: |
            VERSION=${{ env.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.build_date }}
          labels: |
            org.opencontainers.image.title=balda
            org.opencontainers.image.description=Balda Telegram runtime with bundled provider CLIs
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.version }}
            org.opencontainers.image.created=${{ env.build_date }}
