# Balda Bot Configuration
# Environment variables override these settings with BALDA_ prefix
# Example: BALDA_TELEGRAM_TOKEN=my-token

balda:
  # Provider id from runtime providers registry used for Balda sessions.
  provider: ""

  telegram:
    # Telegram bot token (required)
    # Set via BALDA_TELEGRAM_TOKEN env var
    token: ""
    # Formatting mode for outbound Telegram text:
    # - rich_markdown: model writes Markdown/plain text; balda sends Telegram rich Markdown (default)
    # - rich_html: model writes rich-message HTML; balda sends Telegram rich HTML
    # - markdownv2: legacy parse_mode=MarkdownV2 conversion
    # - html: legacy parse_mode=HTML delivery
    # - none: legacy plain text without parse_mode
    formatting_mode: "rich_markdown"
    # Surface work-plan updates in balda progress.
    # - true: DM thinking placeholders show plan snapshots; public chats/topics receive plain-text plan messages
    # - false: keep typing / Thinking... progress only
    plan_updates: true

    # Optional webhook configuration
    webhook:
      # Register outgoing Telegram webhook URL.
      # Required when webhook.enabled=true.
      url: ""
      # Telegram webhook auth token protection.
      # Required when webhook.enabled=true.
      auth_token: ""
      # Enable local HTTP endpoint for incoming Telegram webhook updates.
      # If false, balda uses polling mode.
      enabled: false
      # Local bind address for webhook endpoint.
      listen_addr: "0.0.0.0:8080"
      # Local HTTP path that receives webhook updates.
      path: "/telegram/webhook"

  zulip:
    # Zulip bot email (required when webhook.enabled=true)
    # Set via BALDA_ZULIP_BOT_EMAIL env var
    bot_email: ""
    # Zulip bot API key (required when webhook.enabled=true)
    # Set via BALDA_ZULIP_API_KEY env var
    api_key: ""
    # Zulip server URL (e.g. https://zulip.qentra.top)
    # Set via BALDA_ZULIP_SERVER_URL env var
    server_url: ""
    # Webhook authentication token — must match the token Zulip sends in the payload.
    # Copy it from the bot's outgoing webhook configuration in Zulip.
    # Set via BALDA_ZULIP_WEBHOOK_TOKEN env var
    webhook_token: ""
    # Zulip user emails that can take over any topic via @mention without /start.
    # On first mention, the user is auto-registered as owner (if none exists) or
    # auto-added as a collaborator. Bare @mention (no message text) sends a welcome.
    # Set via BALDA_ZULIP_ALLOWED_OWNERS as a comma-separated list.
    allowed_owners: []
    # Example:
    # allowed_owners:
    #   - alex@example.com

    webhook:
      # Enable inbound Zulip webhook receiver.
      # Zulip outgoing webhook bot must target: http://<host>:8090/zulip/webhook
      # Set via BALDA_ZULIP_WEBHOOK_ENABLED env var
      enabled: false
      # Local bind address for Zulip webhook endpoint.
      # Set via BALDA_ZULIP_WEBHOOK_LISTEN_ADDR env var
      listen_addr: "0.0.0.0:8090"
      # HTTP path that receives Zulip webhook payloads.
      # Set via BALDA_ZULIP_WEBHOOK_PATH env var
      path: "/zulip/webhook"

  slack:
    # Enable inbound Slack HTTP receiver.
    # Slack's public Request URLs should terminate HTTPS outside Balda and forward
    # plain HTTP to these local endpoints.
    enabled: false
    # Slack bot token (xoxb-...)
    # Set via BALDA_SLACK_BOT_TOKEN env var
    bot_token: ""
    # Slack signing secret used to verify incoming Events API and slash requests.
    # Set via BALDA_SLACK_SIGNING_SECRET env var
    signing_secret: ""
    # Local HTTP bind address for Slack endpoints.
    listen_addr: "0.0.0.0:8091"
    # Local HTTP path for Slack Events API requests.
    events_path: "/slack/events"
    # Local HTTP path for Slack slash command requests.
    commands_path: "/slack/commands"
    # Slack owner subjects allowed to auto-claim ownership on first message.
    # Format: slack:<team_id>:<user_id>
    allowed_owners: []
    # If true, process private channel message events when the Slack app has
    # groups:history. Public channel and DM support does not require this.
    include_private_channels: false

  webhooks:
    # Enable generic inbound webhook ingestion.
    enabled: false
    # Local bind address for inbound webhook endpoint.
    listen_addr: "127.0.0.1:8090"
    # Route table for inbound webhook events.
    # Each route binds:
    # - path: incoming webhook path
    # - prompt_template: Go text/template rendered with request data
    # - envelope: explicit destination and mode
    #   - target/key: destination address (default alias/owner)
    #   - mode: task|session (default task)
    #   - report_to: optional destination for progress/final replies
    # - auth: route auth policy
    #   - type: none|header
    #   - header/value: required for type=header
    # - dedupe: route dedupe policy
    #   - source: request_id|header|body_sha256
    #   - header: required for source=header
    # Available template fields: RequestID, Path, Method, RawBody, Headers
    # Example:
    # routes:
    #   release_notes:
    #     path: "/webhook/release-notes"
    #     prompt_template: |
    #       Request {{.RequestID}} on {{.Path}}
    #       Body:
    #       {{.RawBody}}
    #     envelope:
    #       target: "alias"
    #       key: "owner"
    #       mode: "task"
    #     auth:
    #       type: "header"
    #       header: "X-Webhook-Token"
    #       secret_env: "BALDA_RELEASE_WEBHOOK_TOKEN"
    #     dedupe:
    #       source: "header"
    #       header: "X-Delivery-ID"
    routes: {}

  logger:
    level: "info"
    pretty: true

  # Optional repo/root directory for Balda runtime.
  # If empty, current process directory is used.
  working_dir: ""

  # Balda app state directory.
  # Stores migration-managed state.db (owner/app KV, session metadata, telegram polling offset).
  # Relative paths are resolved from balda.working_dir.
  state_dir: ".config/balda"

  sessions:
    # Conversation/session persistence:
    # - sqlite: persist runtime conversation state in state.db until the session is explicitly closed (default)
    # - memory: keep runtime conversation state in memory only
    persistence: "sqlite"

  memory:
    # Internal durable memory backed by ${balda.state_dir}/MEMORY.md.
    # If false, balda.memory.* MCP tools are disabled.
    enabled: true

  goal:
    # /goal worker-validator loop iteration cap.
    # Balda clamps invalid values to 25.
    max_iterations: 25

  nats:
    # Required built-in command/event runtime.
    embedded: true
    host: "127.0.0.1"
    port: -1
    max_memory: "256mb"
    max_store: "2gb"
    sync_always: false
    expose_monitoring: false

  swarm: {}

  scheduler:
    # Startup-reconciled recurring tasks.
    # Tasks are upserted by id on boot; missing ids are deleted from state.db.
    # Tasks use cron syntax (5 fields) or cron descriptors like @every 10m.
    # By default, scheduled turns are fire-and-forget. Set envelope.report_to to send progress/final replies.
    # Example:
    # tasks:
    #   - id: "owner-daily-summary"
    #     cron: "0 9 * * *"
    #     envelope:
    #       target: "alias"
    #       key: "owner"
    #       content: "Summarize repository status."
    #       report_to:
    #         target: "alias"
    #         key: "owner"
    tasks: []

  workspace:
    # Workspace mode:
    # - on: always use git worktrees per session
    # - off: run agents in balda working_dir directly
    # - auto: use worktrees only when working_dir is a git repo
    # In on mode, balda fails fast if working_dir is not a git repository.
    mode: "auto"
    # Base branch used for workspace branching/import/export.
    # If empty, balda resolves from current HEAD branch at startup.
    base_branch: ""
    # Workspace directory name under balda.state_dir used for per-session worktrees.
    sessions_dir: "sessions"

  # Extra MCP server IDs (from runtime.mcp_servers) injected into every balda-started session.
  # Effective MCP IDs are: bundled default `balda` + agent mcp_servers + balda.mcp_servers.
  # Use the built-in `balda` server ID for Balda workspace/state tools.
  mcp_servers: []

  # Optional balda-wide global instruction applied to all sessions.
  # Applied before runtime.providers.<provider_id>.system_instructions when both are set.
  global_instruction: ""
