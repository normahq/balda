# Norma Balda Bot Configuration
# Environment variables override these settings with BALDA_ prefix
# Example: BALDA_TELEGRAM_TOKEN=my-token

balda:
  # Provider id from runtime providers registry used for Balda sessions.
  provider: ""

  telegram:
    # Telegram bot token (required)
    # Set via BALDA_TELEGRAM_TOKEN env var
    token: ""
    # Formatting mode for final agent replies:
    # - markdownv2: model writes Markdown/plain text; balda converts to Telegram MarkdownV2 (default)
    # - html: model writes Telegram HTML; balda sends with Telegram HTML parse mode
    # - none: balda sends plain text without parse_mode
    formatting_mode: "markdownv2"
    # Surface ACP plan updates in balda progress.
    # - true: DM drafts show plan snapshots; public chats/topics receive plain-text plan messages
    # - false: keep legacy typing / Thinking... progress only
    plan_updates: true

    # Optional webhook configuration
    webhook:
      # Register outgoing Telegram webhook URL.
      # Required when webhook.enabled=true.
      url: ""
      # Telegram webhook auth token protection.
      # Required when webhook.enabled=true.
      auth_token: ""
      # Enable local HTTP endpoint for incoming Telegram webhook updates.
      # If false, balda uses polling mode.
      enabled: false
      # Local bind address for webhook endpoint.
      listen_addr: "0.0.0.0:8080"
      # Local HTTP path that receives webhook updates.
      path: "/telegram/webhook"

  webhooks:
    # Enable generic inbound webhook ingestion.
    enabled: false
    # Local bind address for inbound webhook endpoint.
    listen_addr: "127.0.0.1:8090"
    # WARNING: inbound webhooks are not authenticated by balda itself.
    # Keep this endpoint private (localhost, VPN, or trusted gateway).
    # Route table for inbound webhook events.
    # Each route binds:
    # - path: incoming webhook path
    # - prompt_template: Go text/template rendered with request data
    # Target session is always the owner DM session.
    # Available template fields: RequestID, Path, Method, RawBody, Headers
    # Example:
    # routes:
    #   release_notes:
    #     path: "/webhook/release-notes"
    #     prompt_template: |
    #       Request {{.RequestID}} on {{.Path}}
    #       Body:
    #       {{.RawBody}}
    routes: {}

  logger:
    level: "info"
    pretty: true

  # Optional repo/root directory for Balda runtime.
  # If empty, current process directory is used.
  working_dir: ""

  # Balda app state directory.
  # Stores migration-managed state.db (owner/app KV, session metadata, telegram polling offset).
  # Relative paths are resolved from balda.working_dir.
  state_dir: ".config/balda"

  sessions:
    # ADK conversation/session persistence:
    # - sqlite: persist runtime conversation state in state.db until /reset or explicit /close (default)
    # - memory: keep runtime conversation state in memory only
    persistence: "sqlite"

  memory:
    # Internal durable memory backed by ${balda.state_dir}/MEMORY.md.
    # If false, /memory and balda.memory.* MCP tools are disabled.
    # SOUL.md remains active independently when present.
    enabled: true

  goal:
    # /goal Goalkeeper worker/validator iteration cap.
    # Balda clamps invalid values to 25.
    max_iterations: 25

  nats:
    # Required internal JetStream command/event bus.
    embedded: true
    host: "127.0.0.1"
    port: -1
    jetstream: true
    store_dir: ".balda/nats"
    max_memory: "256mb"
    max_store: "2gb"
    sync_always: false
    expose_monitoring: false

  swarm:
    enabled: true
    commands:
      stream: "BALDA_COMMANDS"
      consumer: "BALDA_WORKER_COMMANDS"
      ack_wait: "5m"
      max_deliver: 5
      max_ack_pending: 64
      fetch_batch: 16
      fetch_wait: "1s"
    events:
      stream: "BALDA_EVENTS"
    dlq:
      stream: "BALDA_DLQ"
    agents:
      # Logical single-process swarm roles. Tools are advisory routing hints.
      planner:
        role: "Plan work and split into subtasks"
        tools: []
      executor:
        role: "Use project tools and make changes"
        tools: ["workspace", "shell", "mcp"]
      reviewer:
        role: "Validate result and inspect risks"
        tools: ["workspace", "shell"]
      memory:
        role: "Extract durable facts and summaries"
        tools: ["memory"]

  scheduler:
    # Startup-reconciled recurring tasks.
    # Tasks are upserted by id on boot; missing ids are removed from state.db.
    # Tasks use cron syntax (5 fields) or cron descriptors like @every 10m.
    # By default, scheduled turns are fire-and-forget. Set envelope.report_to to send progress/final replies.
    # Example:
    # tasks:
    #   - id: "owner-daily-summary"
    #     cron: "0 9 * * *"
    #     envelope:
    #       target: "alias"
    #       key: "owner"
    #       content: "Summarize repository status."
    #       report_to:
    #         target: "alias"
    #         key: "owner"
    tasks: []

  workspace:
    # Workspace mode:
    # - on: always use git worktrees per session
    # - off: run agents in balda working_dir directly
    # - auto: use worktrees only when working_dir is a git repo
    # In on mode, balda fails fast if working_dir is not a git repository.
    mode: "auto"
    # Base branch used for workspace branching/import/export.
    # If empty, balda resolves from current HEAD branch at startup.
    base_branch: ""

  # Extra MCP server IDs (from runtime.mcp_servers) injected into every balda-started session.
  # Effective MCP IDs are: bundled default `balda` + agent mcp_servers + balda.mcp_servers.
  # Removed built-in IDs such as runtime.state, balda.state, and balda.providers are rejected.
  mcp_servers: []

  # Optional balda-wide global instruction applied to all sessions.
  # Applied before runtime.providers.<provider_id>.system_instructions when both are set.
  global_instruction: ""
